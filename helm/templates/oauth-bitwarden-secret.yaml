{{- if and .Values.deploy .Values.oauth.enabled -}}
apiVersion: bitwarden-k8s-secrets-manager.demo.redhat.com/v1
kind: BitwardenSyncSecret
metadata:
  name: oauth-proxy-secret
  namespace: {{ include "parsec.namespaceName" . }}
  labels:
    {{- include "parsec.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    argocd.argoproj.io/sync-wave: "-1"
spec:
  data:
    client-secret:
      secret: {{ .Values.secrets.oauthProxy }}
      key: client_secret
    cookie-secret:
      secret: {{ .Values.secrets.oauthProxy }}
      key: cookie_secret
    session_secret:
      secret: {{ .Values.secrets.oauthProxy }}
      key: session_secret
{{- end -}}
