{{- if .Values.deploy -}}
apiVersion: bitwarden-k8s-secrets-manager.demo.redhat.com/v1
kind: BitwardenSyncSecret
metadata:
  name: {{ include "parsec.name" . }}-secrets
  namespace: {{ include "parsec.namespaceName" . }}
  labels:
    {{- include "parsec.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    argocd.argoproj.io/sync-wave: "-1"
spec:
  data:
    alert-api-key:
      secret: {{ .Values.secrets.apiTokens.alertApiKey }}
    github-token:
      secret: {{ .Values.secrets.apiTokens.githubToken }}
    reporting-mcp-token:
      secret: {{ .Values.secrets.apiTokens.reportingMcpToken }}
{{- end -}}
