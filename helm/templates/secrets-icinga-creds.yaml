{{- if and .Values.deploy .Values.secrets.icinga.enabled -}}
apiVersion: bitwarden-k8s-secrets-manager.demo.redhat.com/v1
kind: BitwardenSyncSecret
metadata:
  name: icinga-credentials
  namespace: {{ include "parsec.namespaceName" . }}
  labels:
    {{- include "parsec.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    argocd.argoproj.io/sync-wave: "-1"
spec:
  data:
    ICINGA_API_URL:
      secret: {{ .Values.secrets.icinga.credentials }}
      key: api_url
    ICINGA_USER:
      secret: {{ .Values.secrets.icinga.credentials }}
      key: username
    ICINGA_PASSWORD:
      secret: {{ .Values.secrets.icinga.credentials }}
      key: password
    ICINGA_VERIFY_SSL:
      secret: {{ .Values.secrets.icinga.credentials }}
      key: verify_ssl
{{- end -}}
