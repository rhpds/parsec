{{- if and .Values.deploy .Values.secrets.gcpBilling.enabled -}}
apiVersion: bitwarden-k8s-secrets-manager.demo.redhat.com/v1
kind: BitwardenSyncSecret
metadata:
  name: gcp-billing-credentials
  namespace: {{ include "parsec.namespaceName" . }}
  labels:
    {{- include "parsec.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
    argocd.argoproj.io/sync-wave: "-1"
spec:
  data:
    service-account.json:
      secret: {{ .Values.secrets.gcpBilling.serviceAccount }}
{{- end -}}
