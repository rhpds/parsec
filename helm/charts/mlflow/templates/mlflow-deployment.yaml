{{- if .Values.deploy -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking
  namespace: {{ include "mlflow.namespaceName" . }}
  labels:
    {{- include "mlflow.labels" . | nindent 4 }}
    component: tracking
spec:
  replicas: {{ .Values.mlflow.replicas }}
  selector:
    matchLabels:
      app: mlflow
      component: tracking
  template:
    metadata:
      labels:
        app: mlflow
        component: tracking
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mlflow-server
          image: {{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres
                  key: database-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres
                  key: database-password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: mlflow-postgres
                  key: database-name
            - name: MLFLOW_BACKEND_STORE_URI
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@mlflow-postgres:5432/$(POSTGRES_DB)"
            - name: BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.s3.bucketName }}
                  key: BUCKET_NAME
            - name: MLFLOW_DEFAULT_ARTIFACT_ROOT
              value: "s3://$(BUCKET_NAME)/"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.bucketName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.bucketName }}
                  key: AWS_SECRET_ACCESS_KEY
            - name: BUCKET_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ .Values.s3.bucketName }}
                  key: BUCKET_HOST
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "http://$(BUCKET_HOST)"
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install --quiet --no-cache-dir --target /tmp/pip-deps psycopg2-binary boto3 &&
              export PYTHONPATH=/tmp/pip-deps:$PYTHONPATH &&
              mlflow server \
                --backend-store-uri "$(MLFLOW_BACKEND_STORE_URI)" \
                --default-artifact-root "$(MLFLOW_DEFAULT_ARTIFACT_ROOT)" \
                --host 0.0.0.0 \
                --port 5000
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
{{- end -}}
