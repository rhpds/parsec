{{- if and .Values.deploy .Values.api.enabled .Values.ingressDomain -}}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mlflow-api-route
  namespace: {{ include "mlflow.namespaceName" . }}
  labels:
    {{- include "mlflow.labels" . | nindent 4 }}
    component: api-proxy
spec:
  host: {{ include "mlflow.externalApiHostname" . }}
  to:
    kind: Service
    name: mlflow-api-proxy
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
{{- end -}}
