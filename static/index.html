<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parsec</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon-32x32.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script>/* Apply saved theme immediately to prevent flash */
    (function(){var t=localStorage.getItem("parsec_theme");if(t)document.documentElement.setAttribute("data-theme",t)})()</script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
</head>
<body>
    <div id="app">
        <aside id="sidebar" class="sidebar open">
            <div class="sidebar-header">
                <span class="sidebar-title">History</span>
                <button id="sidebar-close-btn" class="sidebar-close" title="Close sidebar">&times;</button>
            </div>
            <div id="sidebar-list" class="sidebar-list"></div>
        </aside>
        <button id="sidebar-tab" class="sidebar-tab">History</button>
        <header>
            <img src="/logo.png" alt="Parsec" class="header-logo" height="44">
            <button id="theme-toggle-btn" class="header-btn" title="Toggle light/dark theme" aria-label="Toggle theme"></button>
            <a href="https://cost-monitor.apps.ocpv-infra01.dal12.infra.demo.redhat.com" target="_blank" rel="noopener" class="header-link">Cost Monitor</a>
        </header>
        <div id="shared-banner" class="shared-banner" style="display: none;">
            <span>Viewing a shared investigation</span>
            <button id="continue-btn" class="header-btn">Continue Investigation</button>
        </div>
        <main id="chat">
            <div id="messages"></div>
        </main>
        <footer>
            <form id="query-form">
                <input
                    type="search"
                    id="question"
                    placeholder="Ask a question — e.g. &quot;show me external users with 50+ provisions since December&quot;"
                    autocomplete="off"
                    autofocus
                    data-lpignore="true"
                    data-1p-ignore
                    data-form-type="other"
                    data-keeper-lock="true"
                >
                <button type="submit" id="send-btn">Send</button>
                <button type="button" id="new-chat-btn" class="header-btn" title="Clear conversation and start fresh">New Chat</button>
            </form>
        </footer>
    </div>
    <div id="share-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Share Investigation</h3>
            <p>Anyone with access to Parsec can view this link:</p>
            <div class="share-link-row">
                <input type="text" id="share-link-input" readonly>
                <button id="share-copy-btn" class="header-btn">Copy</button>
            </div>
            <p class="share-hint">This is a read-only snapshot of the current conversation.</p>
            <button id="share-close-btn" class="header-btn">Close</button>
        </div>
    </div>
    <script src="/app.js?v=10"></script>
</body>
</html>
