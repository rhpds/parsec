app:
  name: parsec
  port: 8000
  host: "0.0.0.0"
  log_level: info

anthropic:
  # backend: "api" (direct), "vertex" (GCP Vertex AI), or "bedrock" (AWS Bedrock)
  backend: "api"
  model: "claude-sonnet-4-6"
  max_tokens: 4096
  max_tool_rounds: 10
  # Model for the orchestrator agent. Sub-agents always use the main 'model'
  # above. Set to a faster model (e.g. claude-haiku) to reduce orchestrator
  # routing latency. Empty = same as model.
  # orchestrator_model: ""
  # Vertex AI settings (when backend: "vertex")
  # vertex_project_id: ""  # falls back to gcp.project_id
  # vertex_region: "us-east5"
  # Bedrock settings (when backend: "bedrock")
  # bedrock_region: ""  # falls back to aws.region

provision_db:
  # Direct DB access removed — all queries go through the Reporting MCP.
  # max_rows is still used to limit query results sent to the MCP.
  max_rows: 500

aws:
  profile: "athena"
  region: "us-east-1"
  batch_size: 100

azure:
  storage_account: ""
  container: ""

gcp:
  project_id: ""
  billing_dataset: ""
  billing_account_id: ""

cost_monitor:
  # Internal API URL (cross-namespace within OpenShift cluster)
  api_url: "http://cost-data-service.cost-monitor.svc:8000"
  # User-facing dashboard URL (for linking)
  dashboard_url: ""

cloudtrail:
  event_data_store_id: ""

babylon:
  # Babylon cluster connections for catalog/deployment lookups.
  # Each cluster needs a kubeconfig (token-based or client certificate).
  # Set kubeconfig paths in config.local.yaml.
  # Cluster resolution: the sandbox DynamoDB comment field contains the
  # Babylon console URL — the tool extracts the cluster domain and matches
  # it against configured cluster server URLs automatically.
  clusters: {}
  #   east:
  #     kubeconfig: "~/secrets/babylon-prod.kubeconfig"
  #   west:
  #     kubeconfig: "~/secrets/babylon-west.kubeconfig"

ocpv:
  clusters: {}

aap2:
  # AAP2 controller connections for job investigation.
  # Each controller needs a URL and credentials (username/password).
  # Set credentials in config.local.yaml or via env vars
  # (PARSEC_AAP2__CLUSTERS__EAST__PASSWORD, etc.).
  clusters: {}
  #   east:
  #     url: "https://aap2-prod-us-east-2.aap.infra.demo.redhat.com"
  #     username: "monitor"
  #     password: ""

github:
  # GitHub PAT for accessing private agnosticv repos (read-only).
  # Set via PARSEC_GITHUB__TOKEN env var or parsec-secrets secret.
  # Needs `repo` scope for access to rhpds private repos.
  token: ""
  # GitHub remote MCP server URL (streamable HTTP).
  # Uses GitHub's hosted MCP server — no sidecar needed.
  # Auth via PAT in Authorization header (uses github.token above).
  mcp_url: "https://api.githubcopilot.com/mcp/"

reporting_mcp:
  # Reporting MCP server URL (streamable HTTP transport).
  # Runs in the demo-reporting namespace on the same OpenShift cluster.
  # Cross-namespace access via OpenShift Service DNS.
  # Set in config.local.yaml or PARSEC_REPORTING_MCP__MCP_URL.
  mcp_url: ""
  # Bearer token for MCP Token Auth.
  # Set via PARSEC_REPORTING_MCP__TOKEN env var or parsec-secrets secret.
  token: ""

icinga:
  # Icinga MCP server URL (SSE transport).
  # Runs as a sidecar container (quay.io/rhpds/monitoring-mcp) sharing the
  # network namespace (network_mode: service:parsec in compose, same pod in k8s).
  # The MCP server's transport security requires Host=localhost, so always use
  # localhost (not the service name).
  # Set in config.local.yaml or PARSEC_ICINGA__MCP_URL.
  mcp_url: ""

splunk:
  # Red Hat Corporate Splunk REST API endpoint.
  # Uses federated search to query Splunk Cloud (rhcorporate.splunkcloud.com)
  # via the on-prem API host (splunk-api.corp.redhat.com:8089).
  # Set token via PARSEC_SPLUNK__TOKEN env var or parsec-secrets.
  # Requires VPN or internal network access (port 8089).
  host: "https://splunk-api.corp.redhat.com"
  token: ""
  # username: ""
  # password: ""
  verify_ssl: false  # self-signed cert on internal endpoint

alert_api_key: ""

learnings:
  # Comma-separated list of users who can view/manage agent learnings
  # These users see the learnings panel in the sidebar
  admin_users: "prutledg@redhat.com,andrjone@redhat.com"
  # Set to true in config.local.yaml to allow anonymous (no OAuth) admin access
  # NEVER set this in production
  allow_anonymous_admin: false

debug:
  # Write the full LLM request payload (system prompt, messages, tools) to
  # data/debug/ as JSON before each API call. Useful for prompt inspection.
  dump_prompts: false

auth:
  # Comma-separated list of allowed OpenShift groups (from X-Forwarded-Groups)
  # When set, only users in these groups (or in allowed_users) can access Parsec
  # When empty, group check is skipped and allowed_users is used instead
  allowed_groups: "rhpds-admins,parsec-local-users"
  # Comma-separated list of allowed email addresses or usernames (fallback)
  # When empty and allowed_groups is also empty, all authenticated users are allowed
  allowed_users: ""
