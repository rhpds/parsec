app:
  name: parsec
  port: 8000
  host: "0.0.0.0"
  log_level: info

anthropic:
  # backend: "api" (direct), "vertex" (GCP Vertex AI), or "bedrock" (AWS Bedrock)
  backend: "api"
  model: "claude-sonnet-4-6"
  max_tokens: 4096
  max_tool_rounds: 10
  # Vertex AI settings (when backend: "vertex")
  # vertex_project_id: ""  # falls back to gcp.project_id
  # vertex_region: "us-east5"
  # Bedrock settings (when backend: "bedrock")
  # bedrock_region: ""  # falls back to aws.region

provision_db:
  min_pool_size: 2
  max_pool_size: 10
  statement_timeout_ms: 30000
  max_rows: 500

aws:
  profile: "athena"
  region: "us-east-1"
  batch_size: 100

azure:
  storage_account: ""
  container: ""

gcp:
  project_id: ""
  billing_dataset: ""
  billing_account_id: ""

cost_monitor:
  # Internal API URL (cross-namespace within OpenShift cluster)
  api_url: "http://cost-data-service.cost-monitor.svc:8000"
  # User-facing dashboard URL (for linking)
  dashboard_url: ""

cloudtrail:
  event_data_store_id: ""

babylon:
  # Babylon cluster connections for catalog/deployment lookups.
  # Each cluster needs a kubeconfig (token-based or client certificate).
  # Set kubeconfig paths in config.local.yaml.
  # Cluster resolution: the sandbox DynamoDB comment field contains the
  # Babylon console URL — the tool extracts the cluster domain and matches
  # it against configured cluster server URLs automatically.
  clusters: {}
  #   east:
  #     kubeconfig: "~/secrets/babylon-prod.kubeconfig"
  #   west:
  #     kubeconfig: "~/secrets/babylon-west.kubeconfig"

aap2:
  # AAP2 controller connections for job investigation.
  # Each controller needs a URL and credentials (username/password).
  # Set credentials in config.local.yaml or via env vars
  # (PARSEC_AAP2__CLUSTERS__EAST__PASSWORD, etc.).
  clusters: {}
  #   east:
  #     url: "https://aap2-prod-us-east-2.aap.infra.demo.redhat.com"
  #     username: "monitor"
  #     password: ""

alert_api_key: ""

learnings:
  # Comma-separated list of users who can view/manage agent learnings
  # These users see the learnings panel in the sidebar
  admin_users: "prutledg@redhat.com"
  # Set to true in config.local.yaml to allow anonymous (no OAuth) admin access
  # NEVER set this in production
  allow_anonymous_admin: false

auth:
  # Comma-separated list of allowed OpenShift groups (from X-Forwarded-Groups)
  # When set, only users in these groups (or in allowed_users) can access Parsec
  # When empty, group check is skipped and allowed_users is used instead
  allowed_groups: "rhpds-admins,parsec-local-users"
  # Comma-separated list of allowed email addresses or usernames (fallback)
  # When empty and allowed_groups is also empty, all authenticated users are allowed
  allowed_users: ""
