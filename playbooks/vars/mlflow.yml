---
mlflow_namespace: mlflow
mlflow_cluster_domain: "apps.ocpv-infra01.dal12.infra.demo.redhat.com"

# Operator
mlflow_operator_image: "quay.io/aicoe/mlflow-tracking-operator:v0.1.0"

# Tracking server
mlflow_server_image: "ghcr.io/mlflow/mlflow:v2.12.2"
mlflow_server_replicas: 1
mlflow_server_memory_request: "256Mi"
mlflow_server_memory_limit: "512Mi"

# PostgreSQL
mlflow_postgres_image: "registry.redhat.io/rhel9/postgresql-15:latest"
mlflow_postgres_db: "mlflow"
mlflow_postgres_user: "mlflow"
mlflow_postgres_storage: "10Gi"
mlflow_postgres_storage_class: "ocs-storagecluster-ceph-rbd"

# S3 artifact storage (ODF ObjectBucketClaim)
mlflow_s3_bucket_name: "mlflow-artifacts"
mlflow_s3_storage_class: "openshift-storage.noobaa.io"

# OAuth proxy
mlflow_oauth_groups: "rhpds-admins,ace-octo-team"
mlflow_oauth_proxy_image: "registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest"

# Kubeconfig (cluster-admin for namespace creation + CRDs)
mlflow_kubeconfig: "{{ lookup('env', 'HOME') }}/secrets/ocpv-infra01.dal12.infra.demo.redhat.com.kubeconfig"
