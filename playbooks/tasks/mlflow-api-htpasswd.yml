---
# Create htpasswd Secret for MLflow API basic auth. Idempotent — only creates if not exists.

- name: Check if mlflow-api-htpasswd secret exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ mlflow_kubeconfig }}"
    api_version: v1
    kind: Secret
    name: mlflow-api-htpasswd
    namespace: "{{ mlflow_namespace }}"
  register: _mlflow_api_htpasswd_secret

- name: Create API htpasswd secret (only if not exists)
  when: _mlflow_api_htpasswd_secret.resources | length == 0
  block:
    - name: Generate htpasswd entry
      ansible.builtin.command:
        cmd: "htpasswd -nbB {{ mlflow_api_username }} {{ mlflow_api_password }}"
      register: _mlflow_api_htpasswd_entry
      changed_when: false

    - name: Create mlflow-api-htpasswd secret
      kubernetes.core.k8s:
        kubeconfig: "{{ mlflow_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: mlflow-api-htpasswd
            namespace: "{{ mlflow_namespace }}"
            labels:
              app: mlflow
              component: api-proxy
          type: Opaque
          stringData:
            htpasswd: "{{ _mlflow_api_htpasswd_entry.stdout }}"
