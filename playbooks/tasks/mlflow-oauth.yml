---
# Create OAuth secrets and OAuthClient. Idempotent — only creates if not exists.

- name: Check if mlflow-oauth-secret exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ mlflow_kubeconfig }}"
    api_version: v1
    kind: Secret
    name: mlflow-oauth-secret
    namespace: "{{ mlflow_namespace }}"
  register: _mlflow_oauth_secret

- name: Create OAuth resources (only if not exists)
  when: _mlflow_oauth_secret.resources | length == 0
  block:
    - name: Set OAuth client name
      ansible.builtin.set_fact:
        _mlflow_oauth_client_name: "mlflow-{{ mlflow_namespace }}"

    - name: Generate OAuth secrets
      ansible.builtin.set_fact:
        _mlflow_oauth_client_secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"
        _mlflow_oauth_cookie_secret: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

    - name: Create mlflow-oauth-secret
      kubernetes.core.k8s:
        kubeconfig: "{{ mlflow_kubeconfig }}"
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: mlflow-oauth-secret
            namespace: "{{ mlflow_namespace }}"
          type: Opaque
          stringData:
            client-id: "{{ _mlflow_oauth_client_name }}"
            client-secret: "{{ _mlflow_oauth_client_secret }}"
            cookie-secret: "{{ _mlflow_oauth_cookie_secret }}"
            session_secret: "{{ _mlflow_oauth_cookie_secret }}"

    - name: Create OAuthClient
      kubernetes.core.k8s:
        kubeconfig: "{{ mlflow_kubeconfig }}"
        state: present
        definition:
          apiVersion: oauth.openshift.io/v1
          kind: OAuthClient
          metadata:
            name: "{{ _mlflow_oauth_client_name }}"
            labels:
              app: mlflow
              component: oauth
          secret: "{{ _mlflow_oauth_client_secret }}"
          redirectURIs:
            - "https://mlflow.{{ mlflow_cluster_domain }}/oauth/callback"
          grantMethod: auto
          respondWithChallenges: false
