---
# Create/update all Parsec secrets. Idempotent.

- name: Create parsec-secrets
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: parsec-secrets
        namespace: "{{ target_namespace }}"
      type: Opaque
      stringData:
        db-host: "{{ provision_db_host }}"
        db-port: "{{ provision_db_port }}"
        db-name: "{{ provision_db_name }}"
        db-user: "{{ provision_db_user }}"
        db-password: "{{ provision_db_password }}"
        alert-api-key: "{{ alert_api_key | default('', true) }}"
        github-token: "{{ github_token | default('', true) }}"
        github-pat: "{{ github_pat | default('', true) }}"

- name: Create vertex-credentials
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: vertex-credentials
        namespace: "{{ target_namespace }}"
      type: Opaque
      data:
        service-account.json: "{{ lookup('file', vertex_credentials_path) | b64encode }}"
  when: vertex_credentials_path is defined

- name: Create parsec-cloud-credentials
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: parsec-cloud-credentials
        namespace: "{{ target_namespace }}"
      type: Opaque
      stringData:
        PARSEC_AWS__ACCESS_KEY_ID: "{{ aws_access_key_id }}"
        PARSEC_AWS__SECRET_ACCESS_KEY: "{{ aws_secret_access_key }}"
        PARSEC_AWS__REGION: "{{ aws_region }}"
        PARSEC_AZURE__CLIENT_ID: "{{ azure_client_id }}"
        PARSEC_AZURE__CLIENT_SECRET: "{{ azure_client_secret }}"
        PARSEC_AZURE__TENANT_ID: "{{ azure_tenant_id }}"
        PARSEC_AZURE__STORAGE_ACCOUNT: "{{ azure_storage_account }}"
        PARSEC_AZURE__CONTAINER: "{{ azure_container }}"
        PARSEC_GCP__PROJECT_ID: "{{ gcp_project_id }}"
        PARSEC_GCP__BILLING_DATASET: "{{ gcp_billing_dataset }}"
        PARSEC_GCP__BILLING_ACCOUNT_ID: "{{ gcp_billing_account_id }}"

- name: Create gcp-billing-credentials
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: gcp-billing-credentials
        namespace: "{{ target_namespace }}"
      type: Opaque
      data:
        service-account.json: "{{ lookup('file', gcp_billing_credentials_path) | b64encode }}"
  when: gcp_billing_credentials_path is defined

- name: Build babylon kubeconfig secret data
  ansible.builtin.set_fact:
    _babylon_kc_data: >-
      {{ _babylon_kc_data | default({}) | combine({
           item.key ~ '.kubeconfig': lookup('file', item.value) | b64encode
         })
      }}
  loop: "{{ babylon_kubeconfigs | dict2items }}"
  when: item.value | length > 0
  no_log: true

- name: Create babylon-kubeconfigs
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: babylon-kubeconfigs
        namespace: "{{ target_namespace }}"
      type: Opaque
      data: "{{ _babylon_kc_data }}"
  when: _babylon_kc_data is defined and _babylon_kc_data | length > 0

- name: Create parsec-aap2-credentials
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: parsec-aap2-credentials
        namespace: "{{ target_namespace }}"
      type: Opaque
      stringData:
        PARSEC_AAP2__CLUSTERS__EAST__URL: "{{ aap2_east_url }}"
        PARSEC_AAP2__CLUSTERS__EAST__USERNAME: "{{ aap2_east_username }}"
        PARSEC_AAP2__CLUSTERS__EAST__PASSWORD: "{{ aap2_east_password }}"
        PARSEC_AAP2__CLUSTERS__WEST__URL: "{{ aap2_west_url }}"
        PARSEC_AAP2__CLUSTERS__WEST__USERNAME: "{{ aap2_west_username }}"
        PARSEC_AAP2__CLUSTERS__WEST__PASSWORD: "{{ aap2_west_password }}"
        PARSEC_AAP2__CLUSTERS__EVENT0__URL: "{{ aap2_event0_url }}"
        PARSEC_AAP2__CLUSTERS__EVENT0__USERNAME: "{{ aap2_event0_username }}"
        PARSEC_AAP2__CLUSTERS__EVENT0__PASSWORD: "{{ aap2_event0_password }}"
        PARSEC_AAP2__CLUSTERS__PARTNER0__URL: "{{ aap2_partner0_url }}"
        PARSEC_AAP2__CLUSTERS__PARTNER0__USERNAME: "{{ aap2_partner0_username }}"
        PARSEC_AAP2__CLUSTERS__PARTNER0__PASSWORD: "{{ aap2_partner0_password }}"
  when: aap2_east_url is defined

- name: Create parsec-allowed-users configmap
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    context: "{{ kubeconfig_context | default(omit) }}"
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: parsec-allowed-users
        namespace: "{{ target_namespace }}"
      data:
        allowed-users: "{{ allowed_users | default('', true) }}"
