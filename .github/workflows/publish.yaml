---
name: Publish Image

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, must start with v (e.g., v0.1.2)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    env:
      IMAGE_NAME: parsec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate configuration
        env:
          REG: ${{ vars.IMAGE_REGISTRY }}
          REPO: ${{ vars.IMAGE_REPOSITORY }}
        run: |
          [[ -n "$REG" ]] || { echo "::error::vars.IMAGE_REGISTRY is not set"; exit 1; }
          [[ -n "$REPO" ]] || { echo "::error::vars.IMAGE_REPOSITORY is not set"; exit 1; }

      - name: Resolve version and image tags
        id: image_tags
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REG: ${{ vars.IMAGE_REGISTRY }}
          REPO: ${{ vars.IMAGE_REPOSITORY }}
          IMG: ${{ env.IMAGE_NAME }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            # Dispatch: exact version tag only (no latest/minor — caller controls promotion)
            VERSION="${INPUT_VERSION}"
            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Version must match vMAJOR.MINOR.PATCH (got: ${VERSION})"
              exit 1
            fi
            IMAGE_TAGS=(
              "${REG}/${REPO}/${IMG}:${VERSION}"
            )
          else
            # Tag push: full tag set for production releases
            VERSION=${GITHUB_REF#refs/tags/}
            if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Extracted version '${VERSION}' from GITHUB_REF does not match vMAJOR.MINOR.PATCH"
              exit 1
            fi
            IMAGE_TAGS=(
              "${REG}/${REPO}/${IMG}:latest"
              "${REG}/${REPO}/${IMG}:${VERSION%.*}"
              "${REG}/${REPO}/${IMG}:${VERSION}"
            )
          fi

          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          ( IFS=$','; echo "IMAGE_TAGS=${IMAGE_TAGS[*]}" >> $GITHUB_OUTPUT )

      - name: Verify Chart version
        if: github.event_name != 'workflow_dispatch'
        env:
          VERSION: ${{ steps.image_tags.outputs.VERSION }}
        run: |
          HELM_VERSION=$(sed -nr 's/^appVersion: "?([^"]*)"?/\1/p' helm/Chart.yaml)
          if [[ "${HELM_VERSION}" != "${VERSION}" ]]; then
            echo "Helm appVersion (${HELM_VERSION}) does not match tag (${VERSION})!"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Login to Image Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ vars.IMAGE_REGISTRY }}/${{ vars.IMAGE_REPOSITORY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile
          push: true
          tags: ${{ steps.image_tags.outputs.IMAGE_TAGS }}
          cache-from: type=gha,scope=parsec
          cache-to: type=gha,mode=max,scope=parsec
